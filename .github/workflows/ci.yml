name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# 🌍 KHAI BÁO BIẾN MÔI TRƯỜNG CHUNG CHO TOÀN BỘ PIPELINE
env:
  GCP_REGION: ${{ vars.GCP_REGION }}         # Vùng chạy dịch vụ GCP (Lấy từ GitHub Variables)
  GAR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # Tên Repository trên GCP (Mượn lại biến ECR cũ để đỡ phải sửa trên GitHub)
  HELM_REPO_NAME: ${{ vars.HELM_REPO_NAME }} # Tên Repository chứa code Helm Chart để GitOps deploy
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} # Đường dẫn máy chủ SonarQube để quét chất lượng code
  GCP_PROJECT_ID: "project-e4562d4b-b9ce-4503-b75" # ID dự án cũ trên GCP nơi chứa Artifact Registry

jobs:
  # 🔍 JOB 1: KIỂM TRA CHẤT LƯỢNG CODE (Chỉ chạy khi có Pull Request)
  build-and-sonar:
    if: github.event_name == 'pull_request'
    name: Build, Test, Checkstyle & SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử commit để SonarQube phân tích chính xác

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Cache Sonar scanner cache
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: ${{ runner.os }}-sonar-

      # 🛠️ Biên dịch ứng dụng Java, chạy Unit Test và xuất báo cáo Checkstyle
      - name: Build, run unit tests, and generate Checkstyle report
        run: mvn clean verify checkstyle:checkstyle -B

      # 📊 Đẩy dữ liệu code sang máy chủ SonarQube để phân tích lỗi/bảo mật
      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      # 🛑 Đợi kết quả trả về từ SonarQube, nếu không đạt tiêu chuẩn (Failed Gate) sẽ dừng pipeline
      - name: SonarQube quality gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          pollingTimeoutSec: 600

  # 📦 JOB 2: ĐÓNG GÓI DOCKER VÀ ĐẨY LÊN GCP (Chỉ chạy khi push/merge code vào nhánh main)
  docker-build-push:
    if: github.event_name == 'push'
    name: Build Docker image and push to GAR
    runs-on: ubuntu-latest
    # Xuất các biến đầu ra (Outputs) để Job cập nhật Helm phía sau có thể lấy dùng
    outputs:
      gar_registry: ${{ steps.set-outputs.outputs.gar_registry }}
      gar_image: ${{ steps.set-outputs.outputs.gar_image }}
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      # 🚀 ĐĂNG NHẬP VÀO GOOGLE CLOUD BẰNG NGUYÊN KHỐI FILE JSON KEY TRONG SECRET
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }} # Nạp trọn vẹn file JSON bạn vừa đúc được vào đây

      # ⚙️ Cài đặt các công cụ gcloud CLI cần thiết lên máy ảo GitHub Actions
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 🔐 CẤU HÌNH DOCKER LOGIN VÀO ARTIFACT REGISTRY TỰ ĐỘNG
      # (Lệnh gcloud này tự ghi đè token vào file config của Docker, thay thế hoàn toàn cho lệnh `aws ecr get-login-password`)
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # # 🛠️ TẠO REPOSITORY TRÊN ARTIFACT REGISTRY NẾU TRÊN GCP CHƯA CÓ
      # # Toán tử `||` hoạt động: Nếu lệnh kiểm tra (describe) bị lỗi (chưa có repo) -> Lập tức chạy lệnh tạo mới (create)
      # - name: Create Artifact Registry repository if needed
      #   run: |
      #     gcloud artifacts repositories describe "$GAR_REPOSITORY" \
      #       --location="${{ env.GCP_REGION }}" \
      #       --project="${{ env.GCP_PROJECT_ID }}" >/dev/null 2>&1 || \
      #     gcloud artifacts repositories create "$ECR_REPOSITORY" \
      #       --repository-format=docker \
      #       --location="${{ env.GCP_REGION }}" \
      #       --project="${{ env.GCP_PROJECT_ID }}" \
      #       --description="Docker repository for vprofile app"

      # 🐳 TIẾN HÀNH BUILD VÀ PUSH DOCKER IMAGE THEO ĐỊNH DẠNG URL CỦA GCP
      - name: Build and push Docker images
        id: set-outputs
        run: |
          # Định nghĩa Domain Registry của GCP: {vùng}-docker.pkg.dev/{id-project}
          GAR_REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}"
          
          # Cắt lấy 7 ký tự đầu của mã Commit SHA để làm Tag định danh phiên bản không trùng lặp
          IMAGE_TAG=${GITHUB_SHA::7}
          
          # Đường dẫn image đầy đủ trên GCP: {Domain_Registry}/{Tên_Repository}
          IMAGE_NAME=${GAR_REGISTRY}/${{ env.GAR_REPOSITORY }}
          
          # Thực hiện Build Docker Image từ Dockerfile đa tầng (multistage)
          docker build --file Docker-files/app/multistage/Dockerfile --tag ${IMAGE_NAME}:${IMAGE_TAG} .
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest
          
          # Đẩy image lên GCP Artifact Registry (Không cần 'docker login' nữa vì bước trên gcloud đã làm rồi)
          docker push ${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${IMAGE_NAME}:latest
          
          # Ghi các giá trị này vào file hệ thống $GITHUB_OUTPUT để truyền sang cho Job update-helm nhận diện
          echo "gar_registry=${GAR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "gar_image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  # 🔄 JOB 3: CẬP NHẬT FILE CẤU HÌNH GITOPS HELM (Chỉ chạy khi Job build bên trên thành công)
  update-helm:
    if: github.event_name == 'push'
    name: Update Helm values in separate repo
    runs-on: ubuntu-latest
    needs: docker-build-push # Bắt buộc Job build docker xong thành công thì mới chạy job này
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      # 📥 Cài đặt công cụ 'yq' (Xử lý file YAML bằng dòng lệnh) lên máy ảo
      - name: Install yq
        run: |
          YQ_VERSION="v4.45.1"
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      # 👥 Clone cái Repository chứa mã nguồn Helm Chart GitOps về máy ảo bằng Token cá nhân (PAT)
      - name: Clone Helm repository
        run: |
          git clone https://${{ secrets.HELM_REPO_USER }}:${{ secrets.GITOPS_PAT }}@github.com/${{ github.repository_owner }}/${{ env.HELM_REPO_NAME }}.git helm-repo

      # 🔄 GHI ĐÈ ĐƯỜNG DẪN IMAGE VÀ TAG MỚI CỦA GCP VÀO FILE VALUES.YAML
      - name: Update Helm values.yaml image and tag
        run: |
          cd helm-repo
          # Dùng yq ghi đè giá trị Image và Tag mới của GCP vào đúng cây thư mục .app.image và .app.tag
          yq eval '.app.image = env(GCP_IMAGE) | .app.tag = env(IMAGE_TAG)' -i helm/vprofile/values.yaml
        env:
          # Đón nhận các biến Output đầu ra được truyền sang từ Job 'docker-build-push' phía trên
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          GCP_IMAGE: ${{ needs.docker-build-push.outputs.gar_image }}

      # 💾 COMMIT VÀ PUSH FILE THAY ĐỔI LÊN REPO HELM ĐỂ KÍCH HOẠT ARGO CO/FLUX CD TỰ ĐỘNG DEPLOY
      - name: Commit and push Helm repo update
        run: |
          cd helm-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          # Kiểm tra xem file values.yaml có sự thay đổi thực sự hay không (Tránh commit rỗng gây lỗi pipeline)
          if ! git diff --quiet; then
            git add helm/vprofile/values.yaml
            git commit -m "Update Helm app.image and app.tag to ${IMAGE_TAG} on main"
            git push origin HEAD:main
          else
            echo "No changes to commit (Không có gì thay đổi)"
          fi
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com